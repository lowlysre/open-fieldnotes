name: Unit & WCAG Tests

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  discussions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - uses: lowlydba/sustainable-npm@31d51025884f424f58f22e4e6578178bb4e79632 # v3

      - run: npm ci

      - name: Unit tests
        run: npm test

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers and system deps (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Ensure Playwright Chromium is installed (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install chromium

      - name: Fetch discussions
        run: npm run fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Accessibility tests
        run: npm run test:a11y
